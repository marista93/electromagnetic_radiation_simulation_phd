<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider Μήκους Κύματος</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="panel">
    <label class="slider-label" for="wavelength">
      <span>λ (μήκος κύματος)</span>
      <output id="wavelengthValue" for="wavelength">550 nm</output>
    </label>

    <input
      id="wavelength"
      class="slider"
      type="range"
      min="380"
      max="780"
      value="550"
      step="1"
    >
  </main>

  <script src="script.js"></script>
</body>
</html>
